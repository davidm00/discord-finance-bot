name: Scheduled Finance Report

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  schedule:
    # GitHub Actions cron uses UTC (no true timezone/DST support).
    # To handle both EDT and EST automatically, we schedule BOTH possible UTC times.
    # A guard in bot/report.py ensures only runs near 8:45 AM ET / 4:15 PM ET actually post.
    # Pre-market: 8:45 AM ET -> 12:45 UTC (EDT) or 13:45 UTC (EST)
    - cron: '45 12 * * 1-5'
    - cron: '45 13 * * 1-5'
    # Post-market: 4:15 PM ET -> 20:15 UTC (EDT) or 21:15 UTC (EST)
    - cron: '15 20 * * 1-5'
    - cron: '15 21 * * 1-5'
  workflow_dispatch:

jobs:
  report:
    runs-on: ubuntu-latest

    steps:
      - name: Schedule guard (EDT/EST)
        id: guard
        shell: bash
        run: |
          set -euo pipefail

          echo "===== Schedule guard ====="
          echo "Event: $GITHUB_EVENT_NAME"
          echo "UTC now: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "ET  now: $(TZ=America/New_York date '+%Y-%m-%d %H:%M:%S ET')"

          if [ "$GITHUB_EVENT_NAME" != "schedule" ]; then
            echo "Non-schedule event; allowing run."
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          cron=$(python - <<'PY'
import json, os
p=os.environ.get('GITHUB_EVENT_PATH')
with open(p,'r',encoding='utf-8') as f:
  d=json.load(f)
print(d.get('schedule',''))
PY
          )
          echo "Triggered cron: $cron"

          # Determine ET offset (EDT=-4, EST=-5)
          offset=$(python - <<'PY'
from datetime import datetime, timezone
import os
import pytz
et=pytz.timezone('America/New_York')
now=datetime.now(timezone.utc).astimezone(et)
print(int(now.utcoffset().total_seconds()//3600))
PY
          )
          echo "ET UTC offset hours: $offset"

          # Map cron -> expected offset
          # Pre-market 08:45 ET: 12:45 UTC (EDT=-4) or 13:45 UTC (EST=-5)
          # Post-market 16:15 ET: 20:15 UTC (EDT=-4) or 21:15 UTC (EST=-5)
          expected=""
          case "$cron" in
            "45 12 * * 1-5") expected=-4 ;;
            "45 13 * * 1-5") expected=-5 ;;
            "15 20 * * 1-5") expected=-4 ;;
            "15 21 * * 1-5") expected=-5 ;;
            *) expected="" ;;
          esac

          if [ -z "$expected" ]; then
            echo "Unknown cron; allowing run (fail-open)."
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "$offset" = "$expected" ]; then
            echo "Offset matches expected; allowing run."
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "Offset mismatch; skipping run." >&2
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          fi
          echo "=========================="

      - name: Checkout
        if: steps.guard.outputs.should_run == 'true'
        uses: actions/checkout@v4

      - name: Log job context
        if: steps.guard.outputs.should_run == 'true'
        shell: bash
        run: |
          set -euo pipefail
          echo "===== Job context ====="
          echo "Event: $GITHUB_EVENT_NAME"
          echo "Workflow: $GITHUB_WORKFLOW"
          echo "Run ID: $GITHUB_RUN_ID"
          echo "Ref: $GITHUB_REF"
          echo "SHA: $GITHUB_SHA"
          echo "UTC now: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "ET  now: $(TZ=America/New_York date '+%Y-%m-%d %H:%M:%S ET')"
          echo "======================="

      - name: Set up Python
        if: steps.guard.outputs.should_run == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        if: steps.guard.outputs.should_run == 'true'
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Verify Python
        if: steps.guard.outputs.should_run == 'true'
        shell: bash
        run: |
          set -euo pipefail
          python --version
          python -m pip --version

      - name: Install dependencies
        if: steps.guard.outputs.should_run == 'true'
        shell: bash
        run: |
          set -euo pipefail
          echo "[START] Installing dependencies: $(TZ=America/New_York date '+%Y-%m-%d %H:%M:%S ET')"
          python -m pip install --upgrade pip --disable-pip-version-check
          pip install --disable-pip-version-check -r requirements.txt
          echo "[DONE]  Installing dependencies: $(TZ=America/New_York date '+%Y-%m-%d %H:%M:%S ET')"

      - name: Run report
        if: steps.guard.outputs.should_run == 'true'
        shell: bash
        run: |
          set -euo pipefail
          echo "[START] Running report: $(TZ=America/New_York date '+%Y-%m-%d %H:%M:%S ET')"
          if python bot/report.py; then
            echo "[OK]    Report succeeded: $(TZ=America/New_York date '+%Y-%m-%d %H:%M:%S ET')"
          else
            code=$?
            echo "[FAIL]  Report failed (exit=$code): $(TZ=America/New_York date '+%Y-%m-%d %H:%M:%S ET')" >&2
            exit $code
          fi
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_CHANNEL_ID: ${{ secrets.DISCORD_CHANNEL_ID }}
