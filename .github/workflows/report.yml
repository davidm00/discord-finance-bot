name: Scheduled Finance Report

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  schedule:
    # GitHub Actions cron uses UTC (no true timezone/DST support).
    # To handle both EDT and EST automatically, we schedule BOTH possible UTC times.
    # A guard step inside each job ensures only the correct season (EDT vs EST) continues.

    # Pre-market: 8:45 AM ET -> 12:45 UTC (EDT) or 13:45 UTC (EST)
    - cron: '0 12 * * 1-5'
    - cron: '0 13 * * 1-5'

    # Post-market: 4:15 PM ET -> 20:15 UTC (EDT) or 21:15 UTC (EST)
    - cron: '15 20 * * 1-5'
    - cron: '15 21 * * 1-5'

    # Weekly: Saturday 2:20 PM ET (TEMP TEST) -> 18:20 UTC (EDT) or 19:20 UTC (EST)
    - cron: '20 18 * * 6'
    - cron: '20 19 * * 6'

  workflow_dispatch:
    inputs:
      report_kind:
        description: "Which report to run"
        required: false
        default: "daily"
        type: choice
        options:
          - daily
          - weekly
      dry_run:
        description: "If true, run the pipeline but do not send to Discord"
        required: false
        default: "false"

jobs:
  report:
    runs-on: ubuntu-latest

    steps:
      - name: Route and guard (daily)
        id: guard
        shell: bash
        run: |
          set -euo pipefail

          echo "===== Route and guard (daily) ====="
          echo "Event: $GITHUB_EVENT_NAME"
          echo "UTC now: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "ET  now: $(TZ=America/New_York date '+%Y-%m-%d %H:%M:%S ET')"

          # --- Routing: only run for daily-related events ---
          if [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ]; then
            kind=$(python3 -c "import json,os;e=json.load(open(os.environ['GITHUB_EVENT_PATH'],'r',encoding='utf-8'));print((e.get('inputs') or {}).get('report_kind','daily'))")
            echo "Dispatch report_kind: $kind"
            if [ "$kind" = "daily" ] || [ "$kind" = "" ]; then
              echo "Dispatch targets daily; allowing run."
              echo "should_run=true" >> "$GITHUB_OUTPUT"
            else
              echo "Dispatch targets '$kind', not daily; skipping."
              echo "should_run=false" >> "$GITHUB_OUTPUT"
            fi
            exit 0
          fi

          if [ "$GITHUB_EVENT_NAME" != "schedule" ]; then
            echo "Event is '$GITHUB_EVENT_NAME' (not schedule/dispatch); skipping."
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # --- Schedule event: check if this cron belongs to daily ---
          cron=$(python3 -c "import json,os;print((json.load(open(os.environ['GITHUB_EVENT_PATH'],'r',encoding='utf-8')) or {}).get('schedule',''))")
          echo "Triggered cron: $cron"

          # Daily crons only (skip weekly crons)
          case "$cron" in
            "0 12 * * 1-5"|"0 13 * * 1-5"|"15 20 * * 1-5"|"15 21 * * 1-5")
              echo "Cron matches daily schedule."
              ;;
            *)
              echo "Cron '$cron' is not a daily cron; skipping."
              echo "should_run=false" >> "$GITHUB_OUTPUT"
              exit 0
              ;;
          esac

          # --- EDT/EST guard ---
          z=$(TZ=America/New_York date +%z)
          case "$z" in
            "-0400") offset=-4 ;;
            "-0500") offset=-5 ;;
            *) offset=0 ;;
          esac
          echo "ET UTC offset hours: $offset ($z)"

          expected=""
          case "$cron" in
            "0 12 * * 1-5") expected=-4 ;;
            "0 13 * * 1-5") expected=-5 ;;
            "15 20 * * 1-5") expected=-4 ;;
            "15 21 * * 1-5") expected=-5 ;;
          esac

          if [ "$offset" = "$expected" ]; then
            echo "Offset matches expected; allowing run."
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "Offset mismatch; skipping run."
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          fi

          echo "==============================="

      - name: Checkout
        if: steps.guard.outputs.should_run == 'true'
        uses: actions/checkout@v4

      - name: Log job context
        if: steps.guard.outputs.should_run == 'true'
        shell: bash
        run: |
          set -euo pipefail
          echo "===== Job context ====="
          echo "Event: $GITHUB_EVENT_NAME"
          echo "Workflow: $GITHUB_WORKFLOW"
          echo "Run ID: $GITHUB_RUN_ID"
          echo "Ref: $GITHUB_REF"
          echo "SHA: $GITHUB_SHA"
          echo "UTC now: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "ET  now: $(TZ=America/New_York date '+%Y-%m-%d %H:%M:%S ET')"
          echo "======================="

      - name: Set up Python
        if: steps.guard.outputs.should_run == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        if: steps.guard.outputs.should_run == 'true'
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Verify Python
        if: steps.guard.outputs.should_run == 'true'
        shell: bash
        run: |
          set -euo pipefail
          python --version
          python -m pip --version

      - name: Install dependencies
        if: steps.guard.outputs.should_run == 'true'
        shell: bash
        run: |
          set -euo pipefail
          echo "[START] Installing dependencies: $(TZ=America/New_York date '+%Y-%m-%d %H:%M:%S ET')"
          python -m pip install --upgrade pip --disable-pip-version-check
          pip install --disable-pip-version-check -r requirements.txt
          echo "[DONE]  Installing dependencies: $(TZ=America/New_York date '+%Y-%m-%d %H:%M:%S ET')"

      - name: Run report
        if: steps.guard.outputs.should_run == 'true'
        shell: bash
        run: |
          set -euo pipefail
          echo "[START] Running report: $(TZ=America/New_York date '+%Y-%m-%d %H:%M:%S ET')"
          if python bot/report.py; then
            echo "[OK]    Report succeeded: $(TZ=America/New_York date '+%Y-%m-%d %H:%M:%S ET')"
          else
            code=$?
            echo "[FAIL]  Report failed (exit=$code): $(TZ=America/New_York date '+%Y-%m-%d %H:%M:%S ET')" >&2
            exit $code
          fi
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_CHANNEL_ID: ${{ secrets.DISCORD_CHANNEL_ID }}
          DRY_RUN: ${{ github.event.inputs.dry_run || '' }}

  weekly-report:
    runs-on: ubuntu-latest

    steps:
      - name: Route and guard (weekly)
        id: guard
        shell: bash
        run: |
          set -euo pipefail

          echo "===== Route and guard (weekly) ====="
          echo "Event: $GITHUB_EVENT_NAME"
          echo "UTC now: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "ET  now: $(TZ=America/New_York date '+%Y-%m-%d %H:%M:%S ET')"

          # --- Routing: only run for weekly-related events ---
          if [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ]; then
            kind=$(python3 -c "import json,os;e=json.load(open(os.environ['GITHUB_EVENT_PATH'],'r',encoding='utf-8'));print((e.get('inputs') or {}).get('report_kind','daily'))")
            echo "Dispatch report_kind: $kind"
            if [ "$kind" = "weekly" ]; then
              echo "Dispatch targets weekly; allowing run."
              echo "should_run=true" >> "$GITHUB_OUTPUT"
            else
              echo "Dispatch targets '$kind', not weekly; skipping."
              echo "should_run=false" >> "$GITHUB_OUTPUT"
            fi
            exit 0
          fi

          if [ "$GITHUB_EVENT_NAME" != "schedule" ]; then
            echo "Event is '$GITHUB_EVENT_NAME' (not schedule/dispatch); skipping."
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # --- Schedule event: check if this cron belongs to weekly ---
          cron=$(python3 -c "import json,os;print((json.load(open(os.environ['GITHUB_EVENT_PATH'],'r',encoding='utf-8')) or {}).get('schedule',''))")
          echo "Triggered cron: $cron"

          # Weekly crons only (skip daily crons)
          case "$cron" in
            "20 18 * * 6"|"20 19 * * 6")
              echo "Cron matches weekly schedule."
              ;;
            *)
              echo "Cron '$cron' is not a weekly cron; skipping."
              echo "should_run=false" >> "$GITHUB_OUTPUT"
              exit 0
              ;;
          esac

          # --- EDT/EST guard ---
          z=$(TZ=America/New_York date +%z)
          case "$z" in
            "-0400") offset=-4 ;;
            "-0500") offset=-5 ;;
            *) offset=0 ;;
          esac
          echo "ET UTC offset hours: $offset ($z)"

          expected=""
          case "$cron" in
            "20 18 * * 6") expected=-4 ;;
            "20 19 * * 6") expected=-5 ;;
          esac

          if [ "$offset" = "$expected" ]; then
            echo "Offset matches expected; allowing run."
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "Offset mismatch; skipping run."
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          fi

          echo "==============================="

      - name: Checkout
        if: steps.guard.outputs.should_run == 'true'
        uses: actions/checkout@v4

      - name: Set up Python
        if: steps.guard.outputs.should_run == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        if: steps.guard.outputs.should_run == 'true'
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        if: steps.guard.outputs.should_run == 'true'
        shell: bash
        run: |
          set -euo pipefail
          echo "[START] Installing dependencies: $(TZ=America/New_York date '+%Y-%m-%d %H:%M:%S ET')"
          python -m pip install --upgrade pip --disable-pip-version-check
          pip install --disable-pip-version-check -r requirements.txt
          echo "[DONE]  Installing dependencies: $(TZ=America/New_York date '+%Y-%m-%d %H:%M:%S ET')"

      - name: Run weekly report
        if: steps.guard.outputs.should_run == 'true'
        shell: bash
        run: |
          set -euo pipefail
          echo "[START] Running weekly report: $(TZ=America/New_York date '+%Y-%m-%d %H:%M:%S ET')"
          if python bot/weekly_report.py; then
            echo "[OK]    Weekly report succeeded: $(TZ=America/New_York date '+%Y-%m-%d %H:%M:%S ET')"
          else
            code=$?
            echo "[FAIL]  Weekly report failed (exit=$code): $(TZ=America/New_York date '+%Y-%m-%d %H:%M:%S ET')" >&2
            exit $code
          fi
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_CHANNEL_ID: ${{ secrets.DISCORD_CHANNEL_ID }}
          DRY_RUN: ${{ github.event.inputs.dry_run || '' }}
