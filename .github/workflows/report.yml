name: Scheduled Finance Report

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  # Scheduling is handled externally via cron-job.org → workflow_dispatch.
  # GitHub Actions cron was removed due to unreliable timing on free-tier private repos.

  workflow_dispatch:
    inputs:
      report_type:
        description: "Which report to run (daily or weekly)"
        required: false
        default: "daily"
        type: choice
        options:
          - daily
          - weekly
      dry_run:
        description: "If true, run the pipeline but do not send to Discord"
        required: false
        default: "false"

jobs:
  report:
    runs-on: ubuntu-latest

    steps:
      - name: Route and guard (daily)
        id: guard
        shell: bash
        run: |
          set -euo pipefail

          echo "===== Route guard (daily) ====="
          echo "Event: $GITHUB_EVENT_NAME"
          echo "UTC now: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "ET  now: $(TZ=America/New_York date '+%Y-%m-%d %H:%M:%S ET')"

          kind=$(python3 -c "import json,os;e=json.load(open(os.environ['GITHUB_EVENT_PATH'],'r',encoding='utf-8'));print((e.get('inputs') or {}).get('report_type','daily'))")
          echo "Dispatch report_type: $kind"

          if [ "$kind" = "daily" ] || [ "$kind" = "" ]; then
            echo "Targeting daily; allowing run."
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "Targeting '$kind', not daily; skipping."
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          fi

          echo "==============================="

      - name: Checkout
        if: steps.guard.outputs.should_run == 'true'
        uses: actions/checkout@v4

      - name: Log job context
        if: steps.guard.outputs.should_run == 'true'
        shell: bash
        run: |
          set -euo pipefail
          echo "===== Job context ====="
          echo "Event: $GITHUB_EVENT_NAME"
          echo "Workflow: $GITHUB_WORKFLOW"
          echo "Run ID: $GITHUB_RUN_ID"
          echo "Ref: $GITHUB_REF"
          echo "SHA: $GITHUB_SHA"
          echo "UTC now: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "ET  now: $(TZ=America/New_York date '+%Y-%m-%d %H:%M:%S ET')"
          echo "======================="

      - name: Set up Python
        if: steps.guard.outputs.should_run == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        if: steps.guard.outputs.should_run == 'true'
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Verify Python
        if: steps.guard.outputs.should_run == 'true'
        shell: bash
        run: |
          set -euo pipefail
          python --version
          python -m pip --version

      - name: Install dependencies
        if: steps.guard.outputs.should_run == 'true'
        shell: bash
        run: |
          set -euo pipefail
          echo "[START] Installing dependencies: $(TZ=America/New_York date '+%Y-%m-%d %H:%M:%S ET')"
          python -m pip install --upgrade pip --disable-pip-version-check
          pip install --disable-pip-version-check -r requirements.txt
          echo "[DONE]  Installing dependencies: $(TZ=America/New_York date '+%Y-%m-%d %H:%M:%S ET')"

      - name: Restore signals.csv cache
        if: steps.guard.outputs.should_run == 'true'
        uses: actions/cache@v4
        with:
          path: data/signals.csv
          key: signals-csv-${{ github.run_id }}
          restore-keys: signals-csv-

      - name: Run report
        if: steps.guard.outputs.should_run == 'true'
        shell: bash
        run: |
          set -euo pipefail
          echo "[START] Running report: $(TZ=America/New_York date '+%Y-%m-%d %H:%M:%S ET')"
          if python bot/report.py; then
            echo "[OK]    Report succeeded: $(TZ=America/New_York date '+%Y-%m-%d %H:%M:%S ET')"
          else
            code=$?
            echo "[FAIL]  Report failed (exit=$code): $(TZ=America/New_York date '+%Y-%m-%d %H:%M:%S ET')" >&2
            exit $code
          fi
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_CHANNEL_ID: ${{ secrets.DISCORD_CHANNEL_ID }}
          DRY_RUN: ${{ github.event.inputs.dry_run || '' }}

      - name: Save signals.csv cache
        if: steps.guard.outputs.should_run == 'true'
        uses: actions/cache/save@v4
        with:
          path: data/signals.csv
          key: signals-csv-${{ github.run_id }}

      - name: Upload signals CSV as artifact
        uses: actions/upload-artifact@v4
        if: always() && steps.guard.outputs.should_run == 'true'
        with:
          name: signals-csv-${{ github.run_number }}
          path: data/signals.csv
          retention-days: 90
          if-no-files-found: warn

  weekly-report:
    runs-on: ubuntu-latest

    steps:
      - name: Route and guard (weekly)
        id: guard
        shell: bash
        run: |
          set -euo pipefail

          echo "===== Route guard (weekly) ====="
          echo "Event: $GITHUB_EVENT_NAME"
          echo "UTC now: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "ET  now: $(TZ=America/New_York date '+%Y-%m-%d %H:%M:%S ET')"

          kind=$(python3 -c "import json,os;e=json.load(open(os.environ['GITHUB_EVENT_PATH'],'r',encoding='utf-8'));print((e.get('inputs') or {}).get('report_type','daily'))")
          echo "Dispatch report_type: $kind"

          if [ "$kind" = "weekly" ]; then
            echo "Targeting weekly; allowing run."
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "Targeting '$kind', not weekly; skipping."
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          fi

          echo "==============================="

      - name: Checkout
        if: steps.guard.outputs.should_run == 'true'
        uses: actions/checkout@v4

      - name: Set up Python
        if: steps.guard.outputs.should_run == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        if: steps.guard.outputs.should_run == 'true'
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        if: steps.guard.outputs.should_run == 'true'
        shell: bash
        run: |
          set -euo pipefail
          echo "[START] Installing dependencies: $(TZ=America/New_York date '+%Y-%m-%d %H:%M:%S ET')"
          python -m pip install --upgrade pip --disable-pip-version-check
          pip install --disable-pip-version-check -r requirements.txt
          echo "[DONE]  Installing dependencies: $(TZ=America/New_York date '+%Y-%m-%d %H:%M:%S ET')"

      - name: Restore signals.csv cache
        if: steps.guard.outputs.should_run == 'true'
        uses: actions/cache@v4
        with:
          path: data/signals.csv
          key: signals-csv-${{ github.run_id }}
          restore-keys: signals-csv-

      - name: Run weekly report
        if: steps.guard.outputs.should_run == 'true'
        shell: bash
        run: |
          set -euo pipefail
          echo "[START] Running weekly report: $(TZ=America/New_York date '+%Y-%m-%d %H:%M:%S ET')"
          if python bot/weekly_report.py; then
            echo "[OK]    Weekly report succeeded: $(TZ=America/New_York date '+%Y-%m-%d %H:%M:%S ET')"
          else
            code=$?
            echo "[FAIL]  Weekly report failed (exit=$code): $(TZ=America/New_York date '+%Y-%m-%d %H:%M:%S ET')" >&2
            exit $code
          fi
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_CHANNEL_ID: ${{ secrets.DISCORD_CHANNEL_ID }}
          DRY_RUN: ${{ github.event.inputs.dry_run || '' }}

      - name: Save signals.csv cache
        if: steps.guard.outputs.should_run == 'true'
        uses: actions/cache/save@v4
        with:
          path: data/signals.csv
          key: signals-csv-${{ github.run_id }}

      - name: Upload signals CSV as artifact
        uses: actions/upload-artifact@v4
        if: always() && steps.guard.outputs.should_run == 'true'
        with:
          name: signals-csv-weekly-${{ github.run_number }}
          path: data/signals.csv
          retention-days: 90
          if-no-files-found: warn
