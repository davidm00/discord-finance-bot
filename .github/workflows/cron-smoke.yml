name: Cron Smoke Test

on:
  schedule:
    # TEMP: schedule reliability test (runs every 5 minutes)
    - cron: '*/5 * * * *'
  workflow_dispatch:

concurrency:
  group: cron-smoke
  cancel-in-progress: true

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Print schedule + timestamps
        shell: bash
        run: |
          set -euo pipefail
          echo "Event: $GITHUB_EVENT_NAME"
          echo "Triggered cron: ${{ github.event.schedule }}"
          echo "UTC now: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "ET  now: $(TZ=America/New_York date '+%Y-%m-%d %H:%M:%S ET')"

          {
            echo "## Cron Smoke Test"
            echo "- Event: $GITHUB_EVENT_NAME"
            echo "- Triggered cron: ${{ github.event.schedule }}"
            echo "- UTC: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
            echo "- ET:  $(TZ=America/New_York date '+%Y-%m-%d %H:%M:%S ET')"
          } >> "$GITHUB_STEP_SUMMARY"
